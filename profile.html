<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Al Noor</title>
    <link rel="stylesheet" href="profile-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="profile-page">

    <nav class="nav-bar">
        <div class="container nav-content">
            <div class="logo"><i class="fa-solid fa-shirt"></i> Al Noor</div>
            <div class="nav-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="order-history.html">Order History</a>
                <a href="profile.html" class="active">Profile</a>
                <button class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container profile-main">
        <header class="page-header">
            <h1>My Profile</h1>
            <p>Manage your account information and settings</p>
        </header>

        <div class="card info-card" id="profileCard">
            <div class="card-header-flex">
                <h3>Profile Information</h3>
                <button class="btn-edit-profile" id="editBtn"><i class="fa-solid fa-pen-to-square"></i> Edit Profile</button>
            </div>

            <div id="viewMode" class="info-list">
                <div class="info-item">
                    <div class="item-icon teal-bg"><i class="fa-solid fa-user"></i></div>
                    <div class="item-data">
                        <label>Full Name</label>
                        <p id="display-name">John Doe</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="item-icon teal-bg"><i class="fa-solid fa-envelope"></i></div>
                    <div class="item-data">
                        <label>Email Address</label>
                        <p id="display-email">marieroseisip@gmail.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="item-icon teal-bg"><i class="fa-solid fa-phone"></i></div>
                    <div class="item-data">
                        <label>Phone Number</label>
                        <p id="display-phone">(123) 456-7890</p>
                    </div>
                </div>
            </div>

            <form id="editMode" class="info-form hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="input-name" value="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="input-email" value="marieroseisip@gmail.com">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="input-phone" value="(123) 456-7890">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn-update">Save Changes</button>
                </div>
            </form>
        </div>

        <div class="card password-card">
            <h3>Change Password</h3>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="curr-pass" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-pass" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-pass" placeholder="Confirm new password" required>
                </div>
                <div id="pass-msg" class="message"></div>
                <button type="submit" class="btn-update">Update Password</button>
            </form>
        </div>
    </main>

    <footer class="footer-simple">
        <div class="readdy-badge">Designed by <span>Readdy</span></div>
    </footer>

    <script src="profile-js.js"></script>
</body>
</html>
