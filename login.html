<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Al Noor Laundry</title>
    <link rel="stylesheet" href="login-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-logo">
            <i class="fa-solid fa-shirt"></i> Al Noor
        </div>

        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Login to access your account</p>
        </div>

        <div class="login-card">
            <div class="login-tabs">
                <button class="tab-btn active" id="customerTab">Customer Login</button>
                <button class="tab-btn" id="staffTab">Staff Login</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login-full">Login</button>
            </form>

            <div class="login-footer-text">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </div>
    </div>

    <div class="branding-footer">
        <div class="readdy-badge">Designed by <span>Readdy</span></div>
    </div>

    <script src="login-js.js"></script>
</body>
</html>
