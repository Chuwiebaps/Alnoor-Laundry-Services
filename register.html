<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Al Noor Laundry</title>
    <link rel="stylesheet" href="register-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="register-body">

    <div class="register-wrapper">
        <div class="register-logo">
            <i class="fa-solid fa-shirt"></i> Al Noor
        </div>

        <div class="register-header">
            <h1>Create Your Account</h1>
            <p>Join us for convenient laundry services</p>
        </div>

        <div class="register-card">
            <form id="registrationForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="(123) 456-7890" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="btn-signup-full">Sign Up</button>
            </form>
        </div>
    </div>

    <footer class="register-footer">
        <div class="footer-bottom">
            <p>© 2024 Al Noor Laundry Services. All rights reserved.</p>
        </div>
    </footer>

    <script src="register-js.js"></script>
</body>
</html>
